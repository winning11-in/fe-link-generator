<svg xmlns="http://www.w3.org/2000/svg" width="400" height="600" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="g1" cx="50%" cy="18%" r="75%">
      <stop offset="0%" stop-color="#1c1510" />
      <stop offset="60%" stop-color="#0b0b0d" />
      <stop offset="100%" stop-color="#070506" />
    </radialGradient>
    <filter id="f1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" rx="24" fill="url(#g1)" />

  <text x="50%" y="8%" text-anchor="middle" fill="#E6C16B" font-family="Inter, sans-serif" font-size="12" font-weight="600" letter-spacing="1.6">YOU'RE INVITED</text>
  <text x="50%" y="18%" text-anchor="middle" fill="#ffffff" font-family="Playfair Display, serif" font-weight="700" font-size="32">Event Name</text>

  <!-- Date pill -->
  <rect x="120" y="120" rx="22" width="160" height="42" fill="rgba(255,255,255,0.08)" />
  <text x="50%" y="22%" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="12" font-weight="600">December 25, 2024</text>

  <text x="50%" y="31%" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-weight="700" font-size="20">7:00 PM</text>
  <text x="50%" y="36%" text-anchor="middle" fill="rgba(255,255,255,0.88)" font-family="Inter, sans-serif" font-size="12">Venue Location</text>

  <text x="50%" y="41%" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Inter, sans-serif" font-style="italic" font-size="12">Join us for an unforgettable celebration!</text>

  <!-- QR white framed box with shadow -->
  <rect x="95" y="270" rx="20" width="210" height="210" fill="#ffffff" filter="url(#f1)" />
  <rect x="115" y="290" rx="12" width="170" height="170" fill="#000000" />

  <text x="50%" y="88%" text-anchor="middle" fill="#cbd5e1" font-family="Inter, sans-serif" font-size="12">Scan for details</text>
</svg>