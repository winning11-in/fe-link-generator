<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#071122"/>
      <stop offset="100%" stop-color="#071f1b"/>
    </linearGradient>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="rgba(16,185,129,0.06)" />
    </pattern>
    <filter id="f3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" rx="18" fill="url(#bgGrad)" />
  <rect x="16" y="16" rx="12" width="368" height="368" fill="url(#dots)" opacity="0.9" />

  <text x="50%" y="12%" text-anchor="middle" fill="#06b6d4" font-family="Inter, sans-serif" font-weight="600" font-size="12">FOLLOW ME</text>
  <text x="50%" y="19%" text-anchor="middle" fill="#fff" font-family="Poppins, sans-serif" font-weight="700" font-size="22">@username</text>

  <!-- white rounded QR frame with shadow -->
  <rect x="105" y="110" rx="22" width="190" height="190" fill="#ffffff" filter="url(#f3)" />
  <rect x="116" y="122" rx="10" width="168" height="168" fill="#0a0f12" />

  <!-- CTA pill -->
  <rect x="122" y="320" rx="20" width="156" height="36" fill="url(#pill)" />
  <defs>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#05e08a"/>
      <stop offset="100%" stop-color="#00e6a8"/>
    </linearGradient>
  </defs>
  <text x="50%" y="82%" text-anchor="middle" fill="#061b14" font-family="Inter, sans-serif" font-weight="700" font-size="14">Scan to Connect</text>
</svg>